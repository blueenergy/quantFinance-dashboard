name: Frontend CI

on:
  push:
    branches: [ main, master, develop, fix_* ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # required for ghcr.io push

jobs:
  test-build:
    name: Test & Build (Vite + Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - name: Install dependencies (ci)
        run: npm ci
      - name: Run unit tests
        run: npm test -- --coverage=false
      - name: Build
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Upload build metadata (optional)
        if: always()
        run: |
          echo "Commit: $GITHUB_SHA" > build_info.txt
          echo "Date: $(date -u)" >> build_info.txt
          echo "Branch: $GITHUB_REF" >> build_info.txt
      - name: Artifact build info
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build_info.txt

  docker-build:
    name: Build & Push Arch Image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/blueenergy/quant-dashboard
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.fast
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          build-args: |
            VITE_API_BASE=/api

  docker-manifest:
    name: Merge Manifests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Create and push manifests
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # GHCR
          docker manifest create ghcr.io/blueenergy/quant-dashboard:latest \
            ghcr.io/blueenergy/quant-dashboard:latest-amd64 \
            ghcr.io/blueenergy/quant-dashboard:latest-arm64
          docker manifest push ghcr.io/blueenergy/quant-dashboard:latest
          
          docker manifest create ghcr.io/blueenergy/quant-dashboard:$SHA_TAG \
            ghcr.io/blueenergy/quant-dashboard:$SHA_TAG-amd64 \
            ghcr.io/blueenergy/quant-dashboard:$SHA_TAG-arm64
          docker manifest push ghcr.io/blueenergy/quant-dashboard:$SHA_TAG

          # ACR
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest
          
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG

  deploy:
    name: Deploy to VolcEngine (docker pull from ACR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test-build, docker-manifest]
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VOLC_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.VOLC_HOST }} >> ~/.ssh/known_hosts

      - name: Pull image and deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.VOLC_USER }}@${{ secrets.VOLC_HOST }} \
            "docker login crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com \
               -u ${{ secrets.ALIYUN_USER }} -p ${{ secrets.ALIYUN_TOKEN }} && \
             docker pull crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest && \
             docker stop quant-web 2>/dev/null || true && \
             docker rm   quant-web 2>/dev/null || true && \
             docker run -d \
               --name quant-web \
               --restart unless-stopped \
               --add-host=host.docker.internal:host-gateway \
               -p 80:80 \
               -p 443:443 \
               -v /etc/nginx/cert:/etc/nginx/cert:ro \
               -e BACKEND_URL=http://host.docker.internal:3001 \
               -e MCP_URL=http://host.docker.internal:3002 \
               -e ASSISTANT_URL=http://115.190.172.95:8002 \
               -e WS_WORKER_HOST=115.190.172.95 \
               -e SSL_CERT=/etc/nginx/cert/wukongquant.top.pem \
               -e SSL_KEY=/etc/nginx/cert/wukongquant.top.key \
               crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest && \
             docker image prune -f"
