name: Frontend CI

on:
  push:
    branches: [ main, master, develop, fix_* ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write   # required for ghcr.io push

jobs:
  test-build:
    name: Test & Build (Vite + Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - name: Install dependencies (ci)
        run: npm ci
      - name: Run unit tests
        run: npm test -- --coverage=false
      - name: Build
        run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: dist/
      - name: Upload build metadata (optional)
        if: always()
        run: |
          echo "Commit: $GITHUB_SHA" > build_info.txt
          echo "Date: $(date -u)" >> build_info.txt
          echo "Branch: $GITHUB_REF" >> build_info.txt
      - name: Artifact build info
        uses: actions/upload-artifact@v6
        with:
          name: build-info
          path: build_info.txt

  e2e-smoke:
    name: Playwright Smoke (mocked API)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [test-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.4'
          cache: 'npm'
      - name: Install dependencies (ci)
        run: npm ci
      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: frontend-dist
          path: dist/
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run smoke e2e
        run: npm run test:e2e
        env:
          CI: true
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  docker-build:
    name: Build & Push Arch Image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [test-build, e2e-smoke]
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v4
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/blueenergy/quant-dashboard
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard
          tags: |
            type=sha,prefix=sha-,format=short,suffix=-${{ matrix.arch }}
            type=raw,value=latest-${{ matrix.arch }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.fast
          platforms: linux/${{ matrix.arch }}
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.arch }}
          build-args: |
            VITE_API_BASE=/api

  docker-manifest:
    name: Merge Manifests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun Container Registry
        uses: docker/login-action@v4
        with:
          registry: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_USER }}
          password: ${{ secrets.ALIYUN_TOKEN }}

      - name: Create and push manifests
        run: |
          SHA_TAG="sha-${GITHUB_SHA::7}"
          
          # GHCR
          docker manifest create ghcr.io/blueenergy/quant-dashboard:latest \
            ghcr.io/blueenergy/quant-dashboard:latest-amd64 \
            ghcr.io/blueenergy/quant-dashboard:latest-arm64
          docker manifest push ghcr.io/blueenergy/quant-dashboard:latest
          
          docker manifest create ghcr.io/blueenergy/quant-dashboard:$SHA_TAG \
            ghcr.io/blueenergy/quant-dashboard:$SHA_TAG-amd64 \
            ghcr.io/blueenergy/quant-dashboard:$SHA_TAG-arm64
          docker manifest push ghcr.io/blueenergy/quant-dashboard:$SHA_TAG

          # ACR
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:latest
          
          docker manifest create crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG-amd64 \
            crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG-arm64
          docker manifest push crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:$SHA_TAG

  release:
    name: Bump image tag in quant-infrastructure & trigger deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test-build, docker-manifest]
    steps:
      - name: Compute image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Checkout quant-infrastructure
        uses: actions/checkout@v6
        with:
          repository: blueenergy/quant-infrastructure
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Bump versions.env (rebase-retry on concurrent pushes)
        working-directory: infra
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          KEY: QUANT_DASHBOARD_IMAGE_TAG
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            sed -i "s|^${KEY}=.*|${KEY}=${TAG}|" apps/versions.env
            if git diff --quiet apps/versions.env; then
              echo "versions.env already at ${TAG}; nothing to commit."
              exit 0
            fi
            git add apps/versions.env
            git commit -m "deploy(quant-web): ${TAG}"
            if git push origin main; then
              echo "Pushed tag bump (${TAG})."
              exit 0
            fi
            echo "Push raced (attempt ${attempt}); retrying..."
            sleep $((attempt * 5))
          done
          echo "Failed to push tag bump after retries." >&2
          exit 1

      - name: Trigger centralized deploy
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${INFRA_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/blueenergy/quant-infrastructure/dispatches \
            -d "{\"event_type\":\"deploy\",\"client_payload\":{\"services\":\"quant-web\",\"tag\":\"${TAG}\"}}"
